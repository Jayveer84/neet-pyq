<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET 10,000 Biology Practice Portal</title>
    <link rel="stylesheet" href="Style.css">
    <script src="data.js"></script>
    <style>
        :root {
            --primary: #00796b;
            --accent: #2e7d32;
            --bg: #f5f7f8;
            --card-border: #cfd8dc;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0; color: #333;
        }
        .container { max-width: 900px; margin: 30px auto; padding: 0 15px; }
        header {
            background: linear-gradient(135deg, #004d40, var(--primary));
            color: white; text-align: center; padding: 40px 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .controls {
            margin: 25px 0; background: white; padding: 15px;
            border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        select {
            padding: 10px 15px; border-radius: 6px; border: 1px solid var(--card-border);
            font-size: 16px; background: white; outline: none; cursor: pointer;
        }
        .q-card {
            background: white; border: 1px solid var(--card-border);
            padding: 25px; margin-bottom: 20px; border-radius: 8px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.02);
        }
        .q-meta { color: var(--primary); font-weight: bold; margin-bottom: 8px; font-size: 14px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
        .option-item {
            background: #fafafa; border: 1px solid #e0e0e0; padding: 12px 18px;
            border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        .option-item:hover { background: #e0f2f1; border-color: var(--primary); }
        
        .action-zone { text-align: center; margin: 40px 0; }
        .reveal-btn {
            background-color: var(--primary); color: white; border: none;
            padding: 15px 35px; font-size: 18px; border-radius: 30px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.15); transition: 0.2s;
        }
        .reveal-btn:hover { background-color: #004d40; transform: translateY(-1px); }
        
        .answer-sheet {
            display: none; background: white; border: 3px dashed var(--accent);
            padding: 30px; border-radius: 12px; margin-top: 20px;
        }
        .ans-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px; margin-top: 20px;
        }
        .ans-pill {
            background: #e8f5e9; border: 1px solid #a5d6a7;
            padding: 10px; text-align: center; border-radius: 6px;
            font-weight: bold; color: #1b5e20;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>NEET Biology 10,000 PYQs Quest</h1>
            <p>Adaptive Online Self-Assessment System</p>
        </header>

        <div class="controls">
            <span>Select Practice Set:</span>
            <select id="setSelector" onchange="loadSet()">
                <option value="0">Questions 1 - 100</option>
                <option value="100">Questions 101 - 200</option>
                <option value="200">Questions 201 - 300</option>
                <option value="9900">Questions 9901 - 10000</option>
                <button value>select</button>
            </select>
        </div>

        <div id="questions-viewport">Loading questions...</div>

        <div class="action-zone">
            <button class="reveal-btn" onclick="toggleAnswers()">View Answer Sheet</button>
            
            <div class="answer-sheet" id="answerSheetBox">
                <h2 style="color: var(--accent); margin-top:0;">Official Verification Sheet</h2>
                <p>Cross-verify your attempted selections below:</p>
                <div class="ans-grid" id="answers-viewport"></div>
            </div>
        </div>
    </div>

    <script>
        let allQuestions = [];

        // Fetch data array generated by your script
        fetch('data.js')
            .then(response => response.js())
            .then(data => {
                allQuestions = data;
                loadSet(); // Run initialization load
            })
            .catch(err => {
                document.getElementById('questions-viewport').innerHTML = 
                `<p style="color:red;">Error loading database file. Make sure you generated 'neet_10k_biology.json' using the script!</p>`;
            });

        function loadSet() {
            const startIdx = parseInt(document.getElementById('setSelector').value);
            const endIdx = startIdx + 100;
            const currentSubset = allQuestions.slice(startIdx, endIdx);
            
            const qViewport = document.getElementById('questions-viewport');
            const aViewport = document.getElementById('answers-viewport');
            
            // Clear screens and close old answer sheets
            qViewport.innerHTML = "";
            aViewport.innerHTML = "";
            document.getElementById('answerSheetBox').style.display = "none";

            // Render 100 entries dynamically
            currentSubset.forEach(q => {
                qViewport.innerHTML += `
                    <div class="q-card">
                        <div class="q-meta">Q. ${q.id} &bull; ${q.chapter}</div>
                        <div style="font-size: 17px; font-weight: 500;">${q.question}</div>
                        <div class="options-grid">
                            <div class="option-item"><strong>A.</strong> ${q.options[0]}</div>
                            <div class="option-item"><strong>B.</strong> ${q.options[1]}</div>
                            <div class="option-item"><strong>C.</strong> ${q.options[2]}</div>
                            <div class="option-item"><strong>D.</strong> ${q.options[3]}</div>
                        </div>
                    </div>
                `;
                
                aViewport.innerHTML += `
                    <div class="ans-pill">Q${q.id}: ${q.answer}</div>
                `;
            });
        }

        function toggleAnswers() {
            const box = document.getElementById('answerSheetBox');
            if(box.style.display === "block") {
                box.style.display = "none";
            } else {
                box.style.display = "block";
                box.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
